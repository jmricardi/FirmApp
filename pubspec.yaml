name: antigravity_scanner
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  google_sign_in: ^6.2.1
  google_mlkit_document_scanner: ^0.4.1
  google_mlkit_text_recognition: ^0.15.1
  google_mobile_ads: ^8.0.0
  pdf: ^3.10.7
  path_provider: ^2.1.1
  gal: ^2.2.0
  provider: ^6.1.1
  share_plus: ^13.1.0
  intl: ^0.20.2
  http: ^1.2.0
  shared_preferences: ^2.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
